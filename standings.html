<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball Intermediate Standings - Beaverdale Little League</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background: linear-gradient(135deg, #003366 0%, #0066cc 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
        }

        .back-btn {
            background-color: #ffcc00;
            color: #003366;
            padding: 0.5rem 1.5rem;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .back-btn:hover {
            background-color: #ffdd33;
        }

        .standings-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .standings-frame {
            width: 100%;
            height: 800px;
            border: none;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .loading-message {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            margin: 2rem auto;
            max-width: 600px;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .standings-frame {
                height: 600px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Baseball Intermediate Standings - 2026</h1>
            <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
        </div>
    </header>

    <div class="standings-container">
        <iframe 
            class="standings-frame" 
            src="https://clubs.bluesombrero.com/Default.aspx?tabid=1292888&ProgramId=214385&DivisionId=2380152&EventID=659676&TeamId=3259885"
            title="Baseball Intermediate Standings"
            loading="lazy">
        </iframe>
        <noscript>
            <div class="loading-message">
                <p>Your browser doesn't support iframes or JavaScript is disabled.</p>
                <p><a href="https://clubs.bluesombrero.com/Default.aspx?tabid=1292888&ProgramId=214385&DivisionId=2380152&EventID=659676&TeamId=3259885">Click here to view standings</a></p>
            </div>
        </noscript>
    </div>
</body>
</html>
