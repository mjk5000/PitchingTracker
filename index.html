<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Track pitching innings for 7U-12U and 13U+ Little League tournaments. Monitor daily innings, rest requirements, and tournament maximums.">
    <meta name="theme-color" content="#0066cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pitching Tracker">
    <meta name="mobile-web-app-capable" content="yes">
    <title>USSSA Pitching Tracker</title>
    <link rel="stylesheet" href="styles.css?v=1.8.6">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
    <div class="container">
        <header>
            <h1>USSSA Pitching Tracker</h1>
        </header>

        <div class="table-container">
            <table id="pitchingTable">
                <thead>
                    <tr>
                        <th></th>
                        <th>Player</th>
                        <th onclick="setActiveDay('day1')" style="cursor: pointer;">Day 1</th>
                        <th onclick="setActiveDay('day2')" style="cursor: pointer;">Day 2</th>
                        <th onclick="setActiveDay('day3')" style="cursor: pointer;">Day 3</th>
                        <th>Left</th>
                    </tr>
                </thead>
                <tbody id="pitchingTableBody">
                    <!-- Rows will be generated by JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="actions">
            <button onclick="addPlayer()" class="btn-primary">Add Player</button>
            <button onclick="toggleDeleteMode()" class="btn-delete" id="deleteBtn">Remove Player</button>
            <button onclick="resetAllData()" class="btn-secondary">Reset All Data</button>
            <button onclick="shareData()" class="btn-share">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;">
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                    <polyline points="16 6 12 2 8 6"></polyline>
                    <line x1="12" y1="2" x2="12" y2="15"></line>
                </svg>
                Share
            </button>
            <button onclick="openImportModal()" class="btn-share">📥 Import</button>
        </div>

        <div class="rules-summary">
            <h3 class="collapsible-header" onclick="toggleSection('quick-rules')">
                <span class="toggle-icon" id="quick-rules-icon">+</span>
                <span id="rules-title">Quick Reference Rules (7U-12U)</span>
            </h3>
            <div id="quick-rules" class="collapsible-content" style="display: none;">
                <ul id="rules-list">
                    <!-- Rules will be populated by JavaScript -->
                </ul>
            </div>
        </div>

        <div class="settings-section">
            <h3 class="collapsible-header" onclick="toggleSection('settings')">
                <span class="toggle-icon" id="settings-icon">+</span>
                Settings
            </h3>
            <div id="settings" class="collapsible-content" style="display: none;">
                <label class="checkbox-label">
                    <input type="checkbox" id="use13URules" onchange="toggle13URules()">
                    <span>Use 13U+ Division Rules (7 innings daily max)</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="useThreeDayColumn" onchange="toggleThreeDayColumn()">
                    <span>Show Three Day Tournament Column</span>
                </label>
                <button onclick="manualUpdateCheck()" class="btn-secondary" style="width: 100%; margin-top: 1rem;">Check for Updates</button>
            </div>
        </div>
        
        <div class="version">
            v1.8.6
        </div>
    </div>

    <!-- Custom Add Player Modal -->
    <div id="addPlayerModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Add Player</h3>
            <input type="text" id="playerNameInput" placeholder="Enter player name" autocomplete="off" inputmode="text">
            <div class="modal-buttons">
                <button onclick="submitAddPlayer()" class="btn-primary">Add</button>
                <button onclick="closeAddPlayerModal()" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Import Data Modal -->
    <div id="importModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Import Shared Data</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 1rem;">Paste the shared link below to load someone else's pitching data.</p>
            <input type="text" id="importUrlInput" placeholder="Paste shared link here" autocomplete="off" inputmode="url">
            <div class="modal-buttons">
                <button onclick="submitImport()" class="btn-primary">Import</button>
                <button onclick="closeImportModal()" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Edit Player Name Modal -->
    <div id="editPlayerModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Edit Player Name</h3>
            <input type="text" id="editPlayerNameInput" placeholder="Enter new name" autocomplete="off" inputmode="text">
            <div class="modal-buttons">
                <button onclick="submitEditPlayer()" class="btn-primary">Save</button>
                <button onclick="closeEditPlayerModal()" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js?v=1.8.6"></script>
    <script>
        // Register service worker for PWA functionality and auto-updates
        if ('serviceWorker' in navigator) {
            let refreshing = false;
            
            // Reload page when new service worker takes control
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    console.log('Controller changed, reloading');
                    window.location.reload();
                }
            });
            
            // Function to check for version updates
            async function checkForUpdate(showMessage = false) {
                try {
                    // Add timestamp to bypass ALL caches
                    const timestamp = new Date().getTime();
                    const response = await fetch(`./version.json?t=${timestamp}`, { 
                        cache: 'no-store',
                        headers: { 'Cache-Control': 'no-cache' }
                    });
                    const data = await response.json();
                    const remoteVersion = data.version;
                    const currentVersion = '1.8.6';
                    console.log('Current:', currentVersion, 'Remote:', remoteVersion);
                    if (remoteVersion !== currentVersion) {
                        console.log('Version mismatch, forcing reload');
                        if (showMessage) {
                            alert(`Updating to version ${remoteVersion}...`);
                        }
                        // Clear ALL caches
                        if ('caches' in window) {
                            const cacheNames = await caches.keys();
                            await Promise.all(cacheNames.map(name => caches.delete(name)));
                        }
                        // Force hard reload
                        window.location.href = window.location.href.split('?')[0] + '?t=' + timestamp;
                    } else if (showMessage) {
                        alert('You are running the latest version!');
                    }
                } catch (error) {
                    console.log('Version check failed:', error);
                    if (showMessage) {5
                        alert('Failed to check for updates. Please try again.');
                    }
                }
            }5 seconds

                        setInterval(checkForUpdate, 5000);

                        registration.update();
                        setInterval(() => registration.update(), 5
            window.addEventListener('load', () => {
                // Register service worker
                navigator.serviceWorker.register('./sw.js?v=1.8.6')
                    .then(registration => {
                        console.log('ServiceWorker registered:', registration);
                        
                        // Check for updates immediately and every 10 seconds
                        checkForUpdate();
                        setInterval(checkForUpdate, 10000);
                        
                        // Also check with service worker
                        registration.update();
                        setInterval(() => registration.update(), 10000);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
