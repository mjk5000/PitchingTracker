<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track pitching innings for 7U-12U and 13U+ Little League tournaments. Monitor daily innings, rest requirements, and tournament maximums.">
    <meta name="theme-color" content="#0066cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Pitching Tracker">
    <title>Tournament Pitching Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tournament Pitching Tracker</h1>
        </header>

        <div class="table-container">
            <table id="pitchingTable">
                <thead>
                    <tr>
                        <th></th>
                        <th>Player</th>
                        <th>Day 1</th>
                        <th>Day 2</th>
                        <th>Left</th>
                    </tr>
                </thead>
                <tbody id="pitchingTableBody">
                    <!-- Rows will be generated by JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="actions">
            <button onclick="addPlayer()" class="btn-primary">Add Player</button>
            <button onclick="toggleDeleteMode()" class="btn-delete" id="deleteBtn">Remove Player</button>
            <button onclick="shareData()" class="btn-share">Share</button>
            <button onclick="resetAllData()" class="btn-secondary">Reset All Data</button>
        </div>

        <div class="rules-summary">
            <h3 class="collapsible-header" onclick="toggleSection('quick-rules')">
                <span class="toggle-icon" id="quick-rules-icon">+</span>
                <span id="rules-title">Quick Reference Rules (7U-12U)</span>
            </h3>
            <div id="quick-rules" class="collapsible-content" style="display: none;">
                <ul id="rules-list">
                    <!-- Rules will be populated by JavaScript -->
                </ul>
            </div>
        </div>

        <div class="settings-section">
            <h3 class="collapsible-header" onclick="toggleSection('settings')">
                <span class="toggle-icon" id="settings-icon">+</span>
                Settings
            </h3>
            <div id="settings" class="collapsible-content" style="display: none;">
                <label class="checkbox-label">
                    <input type="checkbox" id="use13URules" onchange="toggle13URules()">
                    <span>Use 13U+ Division Rules (7 innings daily max)</span>
                </label>
            </div>
        </div>
        
        <div class="version">
            v1.0.7
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        // Register service worker for PWA functionality and auto-updates
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered:', registration);
                        // Check for updates every time the page loads
                        registration.update();
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
